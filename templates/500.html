{% extends "base.html" %}

{% block title %}Server Error - Project Management System{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <h1 class="display-1 text-muted">500</h1>
            <h2 class="mb-4">Internal Server Error</h2>
            <p class="lead mb-4">Something went wrong on our end. Please try again later.</p>
            <a href="{{ url_for('dashboard') if session.user_id else url_for('home') }}" class="btn btn-primary">
                <i class="fas fa-home me-2"></i>Go to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
